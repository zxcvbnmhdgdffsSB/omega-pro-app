<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omega-Pro AI v2.0</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #0f0f0f, #1a1a2e);
      color: #fff;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
   .container {
      width: 95%;
      max-width: 800px;
      height: 90vh;
      background: #16161d;
      border-radius: 15px;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 30px rgba(0, 255, 136, 0.2);
      border: 1px solid #00ff88;
    }
   .header {
      padding: 20px;
      background: #0f0f0f;
      border-bottom: 2px solid #00ff88;
      text-align: center;
    }
   .header h1 {
      color: #00ff88;
      font-size: 24px;
      text-shadow: 0 0 10px #00ff88;
    }
   .header p { font-size: 12px; color: #aaa; margin-top: 5px; }
    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }
   .msg {
      max-width: 80%;
      padding: 12px 16px;
      border-radius: 12px;
      line-height: 1.6;
      animation: fadeIn 0.3s;
    }
    @keyframes fadeIn { from {opacity: 0; transform: translateY(10px);} to {opacity: 1; transform: translateY(0);} }
   .user {
      background: #0066ff;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }
   .ai {
      background: #2a2a3a;
      align-self: flex-start;
      border-bottom-left-radius: 4px;
      border-left: 3px solid #00ff88;
    }
   .ai img { max-width: 100%; border-radius: 8px; margin-top: 10px; }
   .input-area {
      padding: 15px;
      background: #0f0f0f;
      border-top: 2px solid #00ff88;
      display: flex;
      gap: 10px;
    }
    #userInput {
      flex: 1;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #333;
      background: #1a1a2e;
      color: #fff;
      font-size: 14px;
      outline: none;
    }
    #userInput:focus { border-color: #00ff88; }
    button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #00ff88, #00cc66);
      border: none;
      border-radius: 8px;
      color: #000;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }
    button:hover { transform: scale(1.05); }
   .loading { color: #00ff88; font-style: italic; }
    /* Scrollbar */
    #chat::-webkit-scrollbar { width: 6px; }
    #chat::-webkit-scrollbar-thumb { background: #00ff88; border-radius: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⚡ Omega-Pro AI v2.0</h1>
      <p>Powered by Groq Llama 3.1 + Image Generation</p>
    </div>
    <div id="chat"></div>
    <div class="input-area">
      <input type="text" id="userInput" placeholder="Message bhejo... 'image of dragon' likh ke image banao" />
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

<script>
// ============ SETTINGS ============
let API_KEY = prompt("Apni Groq Key yahan paste karo:"); // Ye line nayi add ki
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const IMAGE_URL = "https://pollinations.ai/p/";
// ===================================

  let chatHistory = [
    { role: "system", content: "You are Omega-Pro AI v2.0. You are helpful, smart, and talk in Urdu/English mix. Be friendly." }
  ];

  const chatBox = document.getElementById("chat");

  function addMessage(text, sender, isImage = false) {
    const div = document.createElement("div");
    div.className = `msg ${sender}`;
    if(isImage) {
      div.innerHTML = `${text}<br><img src="${sender}" />`;
    } else {
      div.innerHTML = text.replace(/\n/g, "<br>");
    }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
  }

  async function getGroqResponse(userMsg) {
    chatHistory.push({ role: "user", content: userMsg });

    const response = await fetch(GROQ_URL, {
      method: "POST",
      headers: {
        "Authorization": `Bearer ${API_KEY}`,
        "Content-Type": "application/json"
      },
      body: JSON.stringify({
        model: "llama-3.1-70b-versatile",
        messages: chatHistory,
        temperature: 0.8,
        max_tokens: 1024
      })
    });

    const data = await response.json();
    const aiMsg = data.choices[0].message.content;
    chatHistory.push({ role: "assistant", content: aiMsg });
    return aiMsg;
  }

  async function sendMessage() {
    const input = document.getElementById("userInput");
    const message = input.value.trim();
    if (!message) return;

    addMessage(message, "user");
    input.value = "";

    const loadingId = "loading-" + Date.now();
    addMessage(`<span class="loading" id="${loadingId}">Omega-Pro soch raha hai...</span>`, "ai");

    try {
      // IMAGE CHECK
      if(message.toLowerCase().includes("image of") || message.toLowerCase().includes("tasveer banao")) {
        const prompt = message.replace(/image of|tasveer banao/gi, "").trim();
        document.getElementById(loadingId).parentElement.remove();
        addMessage(`Ye lo tumhari tasveer:`, IMAGE_URL + encodeURIComponent(prompt), true);
      }
      // CHAT
      else {
        const reply = await getGroqResponse(message);
        document.getElementById(loadingId).parentElement.remove();
        addMessage(reply, "ai");

        // VOICE
        const utterance = new SpeechSynthesisUtterance(reply);
        utterance.lang = 'en-US';
        speechSynthesis.speak(utterance);
      }
    } catch(e) {
      document.getElementById(loadingId).parentElement.remove();
      addMessage("Error aa gaya bro. Key check karo.", "ai");
    }
  }
