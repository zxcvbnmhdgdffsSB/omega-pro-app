<!DOCTYPE html>
<html lang="ur">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Omega-Pro AI v3.0</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{background:#000;color:#fff;display:flex;justify-content:center;align-items:center;height:100vh}
.screen{width:100%;max-width:450px;height:90vh;background:#0a0a0a;border:2px solid #00ff88;border-radius:20px;display:none;flex-direction:column;overflow:hidden;box-shadow:0 0 30px #00ff88}
.screen.active{display:flex}
h1{color:#00ff88;text-align:center;padding:20px;font-size:24px;text-shadow:0 0 10px #00ff88}
input{width:90%;margin:10px auto;padding:12px;background:#111;border:1px solid #00ff88;border-radius:10px;color:#fff;outline:none}
button{width:90%;margin:10px auto;padding:14px;background:#00ff88;border:none;border-radius:10px;color:#000;font-weight:bold;cursor:pointer;font-size:16px}
button:hover{background:#00cc66}
#chatBox{flex:1;overflow-y:auto;padding:15px;display:flex;flex-direction:column;gap:10px}
.msg{background:#111;padding:10px;border-radius:10px;max-width:80%}
.user{align-self:flex-end;background:#00ff88;color:#000}
.bot{align-self:flex-start;border-left:3px solid #00ff88}
#loading{position:fixed;top:0;left:0;width:100%;height:100%;background:#000;display:flex;justify-content:center;align-items:center;z-index:999}
.spinner{border:4px solid #111;border-top:4px solid #00ff88;border-radius:50%;width:50px;height:50px;animation:spin 1s linear infinite}
@keyframes spin{0%{transform:rotate(0)}100%{transform:rotate(360deg)}}
.input-area{display:flex;padding:10px;gap:10px}
#userInput{flex:1;margin:0}
.send-btn{width:80px;margin:0}
</style>
</head>
<body>

<div id="loading"><div class="spinner"></div></div>

<div class="screen" id="loginScreen">
  <h1>⚡ Omega-Pro Login</h1>
  <input type="text" id="username" placeholder="Username">
  <input type="password" id="password" placeholder="Password">
  <button onclick="login()">Login</button>
  <p style="text-align:center;margin-top:10px">Demo: user / 1234</p>
</div>

<div class="screen" id="dashboardScreen">
  <h1>📊 Dashboard</h1>
  <p style="text-align:center">Welcome to Omega-Pro v3.0</p>
  <button onclick="showScreen('chatScreen')">Chat with AI</button>
  <button onclick="showScreen('paymentScreen')">💳 Upgrade Pro - $5</button>
  <button onclick="logout()">Logout</button>
</div>

<div class="screen" id="paymentScreen">
  <h1>💳 Payment</h1>
  <input type="text" placeholder="Card Number">
  <input type="text" placeholder="MM/YY">
  <input type="text" placeholder="CVV">
  <button onclick="pay()">Pay $5 Now</button>
  <button onclick="showScreen('dashboardScreen')">Back</button>
</div>

<div class="screen" id="chatScreen">
  <h1>⚡ Omega-Pro AI v3.0</h1>
  <div id="chatBox"></div>
  <div class="input-area">
    <input type="text" id="userInput" placeholder="Message bhejo... 'image of dragon'">
    <button class="send-btn" onclick="sendMessage()">Send</button>
  </div>
</div>

<script>
let API_KEY = localStorage.getItem("groq_key");
if(!API_KEY){ 
  API_KEY = prompt("Apni Groq Key yahan paste karo:\ngsk_..."); 
  localStorage.setItem("groq_key", API_KEY); 
}
const GROQ_URL = "https://api.groq.com/openai/v1/chat/completions";
const IMAGE_URL = "https://pollinations.ai/p/";

setTimeout(()=>{
  document.getElementById("loading").style.display="none";
  showScreen("loginScreen");
},2000);

function showScreen(id){
  document.querySelectorAll(".screen").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function login(){
  let u=document.getElementById("username").value;
  let p=document.getElementById("password").value;
  if(u=="user" && p=="1234"){ showScreen("dashboardScreen"); }
  else{ alert("Wrong! Demo: user / 1234"); }
}

function logout(){ showScreen("loginScreen"); }

function pay(){
  alert("Payment Successful! Pro Activated");
  showScreen("dashboardScreen");
}

async function sendMessage(){
  const input=document.getElementById("userInput");
  const msg=input.value.trim();
  if(!msg) return;
  addMsg(msg,"user");
  input.value="";
  
  if(msg.toLowerCase().startsWith("image of")){
    let prompt=msg.replace("image of","").trim();
    addMsg(`Image bana raha hun: ${prompt}`,"bot");
    let img=document.createElement("img");
    img.src=IMAGE_URL+encodeURIComponent(prompt);
    img.style="width:100%;border-radius:10px;margin-top:5px";
    document.getElementById("chatBox").appendChild(img);
    return;
  }
  
  addMsg("Soch raha hun...","bot");
  try{
    let res=await fetch(GROQ_URL,{
      method:"POST",
      headers:{"Content-Type":"application/json","Authorization":`Bearer ${API_KEY}`},
      body:JSON.stringify({model:"llama3-8b-8192",messages:[{role:"user",content:msg}]})
    });
    let data=await res.json();
    document.querySelector("#chatBox.bot:last-child").remove();
    addMsg(data.choices[0].message.content,"bot");
  }catch(e){
    document.querySelector("#chatBox.bot:last-child").remove();
    addMsg("Error aa gaya bro. Key check karo","bot");
  }
}

function addMsg(text,type){
  let div=document.createElement("div");
  div.className=`msg ${type}`;
  div.innerText=text;
  document.getElementById("chatBox").appendChild(div);
  document.getElementById("chatBox").scrollTop=chatBox.scrollHeight;
}

document.getElementById("userInput").addEventListener("keypress", e => {
  if (e.key === "Enter") sendMessage();
});
</script>
</body>
  </html>
