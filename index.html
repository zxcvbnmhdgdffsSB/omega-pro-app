<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#6a11cb">
  <title>Omega-Pro</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(180deg, #6a11cb 0%, #2575fc 100%);
      color: white;
      font-family: 'Segoe UI', Arial, sans-serif;
      min-height: 100vh;
      padding: 20px;
    }
    .page { display: none; text-align: center; }
    .active { display: block; }
    .logo { font-size: 80px; margin: 20px 0; }
    h1 { font-size: 32px; margin-bottom: 15px; }
    p { font-size: 16px; opacity: 0.9; margin-bottom: 20px; }
    input {
      width: 90%;
      max-width: 350px;
      padding: 14px;
      margin: 10px 0;
      border-radius: 12px;
      border: none;
      font-size: 16px;
      outline: none;
    }
    button {
      background: #FFD700;
      color: #000;
      border: none;
      padding: 15px 40px;
      font-size: 18px;
      border-radius: 15px;
      margin: 10px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 4px 15px rgba(255, 215, 0, 0.3);
    }
    button:active { transform: scale(0.95); }
    .card {
      background: rgba(255,255,255,0.1);
      padding: 20px;
      border-radius: 20px;
      margin: 15px auto;
      max-width: 400px;
      backdrop-filter: blur(10px);
    }
    .btn-red { background: #ff4d4d; color: white; }
  </style>
</head>
<body>

  <!-- 1. HOME PAGE -->
  <div id="home" class="page active">
    <div class="logo">⚡</div>
    <h1>Omega-Pro</h1>
    <p>AI is Ready</p>
    <button onclick="showPage('login')">Start Now</button>
  </div>

  <!-- 2. LOGIN PAGE -->
  <div id="login" class="page">
    <h1>Login</h1>
    <input type="text" placeholder="Username" id="user">
    <input type="password" placeholder="Password" id="pass">
    <br>
    <button onclick="login()">Login</button>
    <br>
    <button class="btn-red" onclick="showPage('home')">Back</button>
  </div>

  <!-- 3. DASHBOARD PAGE -->
  <div id="dashboard" class="page">
    <h1>Welcome to Dashboard</h1>
    <p id="welcomeUser">Hello User!</p>
